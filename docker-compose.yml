services:
  cv-builder:
    build: .
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - DATABASE_URL=file:./data/cv-builder.db
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - cv-data:/app/data
    restart: unless-stopped

volumes:
  cv-data:
